<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 My To-Do List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Tipografías dulces -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./assets/css/style.css">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- script de moment.js (CDN estable) -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js"></script>

    <script defer type="module" src="./assets/js/script.js"></script>
</head>

<body>

    <header class="hero text-center">
        <h1 class="hero-title">🎀 My To-Do List 🎀</h1>
        <p class="hero-subtitle">Organiza tu día con estilo ✨🌸</p>
    </header>

    <main class="container pb-5">

        <section class="card-rosa">
            <h2 class="titulo-seccion">🌷 Agrega una nueva tarea</h2>
            <form id="form-add-tarea">
                <div class="mb-3">
                    <label for="input-descripcion-tarea" class="form-label">Descripción</label>
                    <input type="text" class="form-control" name="descripcion" id="input-descripcion-tarea"
                        placeholder="¿Qué tienes que hacer hoy?..." required>
                    <small class="contador" id="contador-caracteres">0 caracteres</small>
                </div>
                <div class="mb-3">
                    <label for="input-fecha-limite" class="form-label">Fecha límite (opcional)</label>
                    <input type="date" class="form-control" name="fechaLimite" id="input-fecha-limite">
                </div>
                <div class="d-flex flex-wrap gap-2">
                    <button type="submit" class="btn-lindo btn-agregar">✿ Agregar Tarea</button>
                    <button type="button" class="btn-lindo btn-importar" id="btn-importar-api">☁ Importar desde API</button>
                </div>
            </form>

            <div class="stats-wrapper">
                <span class="stat-pill stat-total">Totales: <b id="stat-totales">0</b></span>
                <span class="stat-pill stat-ok">Finalizadas: <b id="stat-finalizadas">0</b></span>
                <span class="stat-pill stat-pend">Pendientes: <b id="stat-pendientes">0</b></span>
            </div>
        </section>

        <section class="card-rosa">
            <h2 class="titulo-seccion text-center">🐱 Listado de tareas</h2>

            <div class="tabla-scroll">
                <table class="table tabla-tareas d-none" id="tabla-tareas">
                    <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Descripción</th>
                            <th scope="col">Estado</th>
                            <th scope="col">Fecha creación</th>
                            <th scope="col">Fecha límite</th>
                            <th scope="col">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- AQUÍ SE AGREGAN LAS TAREAS DE FORMA DINÁMICA -->
                    </tbody>
                </table>
                <div class="alert-vacio" role="alert" id="alert-sin-tareas">
                    🌸 No hay tareas por mostrar... ¡Agrega una! 🌸
                </div>
            </div>
        </section>

    </main>

    <footer class="text-center pb-4">
        Hecho con 💖 por Javiera Saavedra
    </footer>

    <!-- Contenedor de notificaciones dinámicas -->
    <div id="contenedor-notificaciones"></div>

</body>

</html>
